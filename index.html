  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Vazirmatn', Tahoma, sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    h1, h2, h3, h4, h5 {
      font-family: 'Vazirmatn', 'Poppins', sans-serif;
    }

    /* ===== پری‌لودر ===== */
    #preloader {
      position: fixed;
      inset: 0;
      background: #1a4a7a;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }

    .preloader-dot {
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      margin: 0 5px;
      animation: bounce 0.8s infinite alternate;
    }

    .preloader-dot:nth-child(2) { animation-delay: 0.2s; }
    .preloader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      from { transform: translateY(0); opacity: 0.4; }
      to   { transform: translateY(-20px); opacity: 1; }
    }

    /* ===== نشان (مارک بصری تکرارشونده) ===== */
    .arkan-mark {
      width: 1em;
      height: 1em;
      display: inline-block;
      vertical-align: middle;
    }

    /* ===== هدر ===== */
    header {
      background: white;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(26,74,122,0.1);
      padding: 0 30px;
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 20px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo .arkan-mark { width: 30px; height: 30px; color: #1a4a7a; }

    .logo h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #1a4a7a;
      letter-spacing: 3px;
    }

    .logo span { color: #5b9fd6; }

    .tagline {
      font-size: 11px;
      color: #9ab3ca;
      letter-spacing: 0.5px;
      border-right: 1px solid #ddeeff;
      padding-right: 14px;
      margin-right: 4px;
      white-space: nowrap;
    }

    @media(max-width:900px) { .tagline { display: none; } }

    nav ul {
      list-style: none;
      display: flex;
      gap: 5px;
    }

    nav ul a {
      text-decoration: none;
      color: #555;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.2s;
      white-space: nowrap;
    }

    nav ul a:hover,
    nav ul a.active {
      color: #1a4a7a;
      background: #f0f7ff;
    }

    .nav-register a {
      background: #1a4a7a !important;
      color: white !important;
      border-radius: 50px !important;
      padding: 8px 18px !important;
    }

    .nav-register a:hover {
      background: #2e6fad !important;
    }

    /* ===== بنر اصلی ===== */
    .hero {
      background: linear-gradient(135deg, #1a4a7a 0%, #2e6fad 60%, #5b9fd6 100%);
      color: white;
      padding: 100px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -100px; left: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: -120px; right: -80px;
      width: 450px; height: 450px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .hero-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }

    .hero-badge {

      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      letter-spacing: 3px;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);

    .hero-badge .arkan-mark { width: 14px; height: 14px; }

      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;

      text-decoration: none;
      transition: 0.3s;

      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn-ghost {
      padding: 14px 32px;
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s;
      display: inline-block;

      grid-template-columns: repeat(4, 1fr);

      font-family: 'Poppins', sans-serif;
      font-size: 40px;
      font-weight: 700;
      color: #1a4a7a;
    }

    .stat-item p { color: #888; font-size: 13px; margin-top: 5px; }

    /* ===== بخش‌ها ===== */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 30px;
    }

    .section-head { text-align: center; margin-bottom: 50px; }

    .section-head span.eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      color: #5b9fd6;

      align-items: center;
      gap: 6px;
      margin-bottom: 10px;

    .section-head span.eyebrow .arkan-mark { width: 12px; height: 12px; }

    .section-head h2 {

    .section-head p {

      margin-right: auto;
      line-height: 2;
    }

    /* ===== خدمات ===== */
    .services-bg { background: #f0f7ff; }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 25px;
    }

    .service-card {
      background: white;
      border-radius: 20px;
      padding: 35px 25px;
      text-align: center;
      border: 1px solid #ddeeff;
      transition: 0.3s;
      cursor: pointer;
    }

    .service-card:hover {

      box-shadow: 0 20px 50px rgba(26,74,122,0.12);
      border-color: #5b9fd6;

    .service-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      color: #1a4a7a;

    }

    .service-card h4 {
      color: #1a4a7a;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .service-card p {
      color: #888;
      font-size: 13px;
      line-height: 1.9;
      margin-bottom: 20px;
    }

    .btn-read {
      display: inline-block;
      padding: 8px 20px;
      background: #f0f7ff;
      color: #1a4a7a;
      border-radius: 50px;
      font-size: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
      border: 1px solid #c8dff0;
    }

    .btn-read:hover { background: #1a4a7a; color: white; }

    /* ===== درباره من ===== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    @media(max-width:700px) { .about-grid { grid-template-columns: 1fr; } }

    .about-visual {
      background: linear-gradient(135deg, #f0f7ff, #ddeeff);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      border: 1px solid #c8dff0;
    }

    .about-visual .arkan-mark { width: 70px; height: 70px; color: #1a4a7a; }

    .about-text p {
      color: #555;
      font-size: 15px;
      line-height: 2.2;
      margin-bottom: 15px;
    }

    /* آکاردئون */
    .accordion { margin-top: 20px; }

    .acc-item {
      border: 1px solid #ddeeff;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .acc-btn {
      width: 100%;
      padding: 16px 20px;
      background: white;
      border: none;
      text-align: right;
      font-size: 14px;
      font-weight: 600;
      color: #1a4a7a;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .acc-btn .acc-label { display: flex; align-items: center; gap: 10px; }
    .acc-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .acc-btn:hover { background: #f0f7ff; }
    .acc-btn.active { background: #1a4a7a; color: white; }

    .acc-body {
      display: none;
      padding: 15px 20px;
      background: #f8fbff;
      color: #666;
      font-size: 13px;
      line-height: 2;
    }

    .acc-body.open { display: block; }

    /* ===== تأمل گشتالتی ===== */
    .reflect-bg { background: white; border-top: 1px solid #e8f0f8; border-bottom: 1px solid #e8f0f8; }

    .reflect-inner {
      max-width: 650px;
      margin: 0 auto;
      padding: 70px 30px;
      text-align: center;
    }

    .reflect-inner .arkan-mark { width: 34px; height: 34px; color: #5b9fd6; margin-bottom: 18px; }

    .reflect-quote {
      font-size: 19px;
      color: #1a4a7a;
      font-weight: 600;
      line-height: 1.9;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reflect-btn {
      margin-top: 22px;
      padding: 10px 26px;
      background: #f0f7ff;
      border: 1px solid #c8dff0;
      color: #1a4a7a;
      border-radius: 50px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .reflect-btn:hover { background: #1a4a7a; color: white; }
    .reflect-btn svg { width: 15px; height: 15px; }

    /* ===== مهارت‌ها ===== */
    .skills-bg { background: #f0f7ff; }

    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }

    @media(max-width:700px) { .skills-grid { grid-template-columns: 1fr; } }

    .team-cards { display: flex; flex-direction: column; gap: 20px; }

    .team-card {
      background: white;
      border: 1px solid #ddeeff;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: 0.3s;
    }

    .team-card:hover {
      border-color: #5b9fd6;
      box-shadow: 0 8px 25px rgba(26,74,122,0.1);
    }

    .team-avatar {
      width: 65px;
      height: 65px;
      background: #f0f7ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #1a4a7a;
    }

    .team-avatar svg { width: 30px; height: 30px; }

    .team-info h4 { color: #1a4a7a; font-size: 16px; margin-bottom: 4px; }
    .team-info p { color: #888; font-size: 12px; }

    .skill-box { margin-bottom: 18px; }

    .skill-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }

    .skill-bar {
      background: #ddeeff;
      border-radius: 50px;
      height: 10px;
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #1a4a7a, #5b9fd6);
      animation: fillBar 1.5s ease-out;
    }

    @keyframes fillBar { from { width: 0; } }

    /* ===== عکس‌ها ===== */
    .photos-bg { background: linear-gradient(135deg, #1a4a7a, #2e6fad); }

    .photos-inner {
      text-align: center;
      padding: 60px 30px;
      color: white;
    }

    .photos-inner > p {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      margin-bottom: 25px;
    }

    .photos-row {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .photo-slot {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== تماس ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 30px;
    }

    @media(max-width:700px) { .contact-grid { grid-template-columns: 1fr; } }

    .form-box {
      background: white;
      border: 1px solid #ddeeff;
      border-radius: 20px;
      padding: 35px;
      box-shadow: 0 5px 30px rgba(26,74,122,0.08);
    }

    .form-box input,
    .form-box textarea {
      width: 100%;
      padding: 13px 16px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddeeff;
      background: #f8fbff;
      color: #333;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
      font-family: 'Vazirmatn', Tahoma;
    }

    .form-box input:focus,
    .form-box textarea:focus {
      border-color: #5b9fd6;
      box-shadow: 0 0 0 3px rgba(91,159,214,0.1);
    }

    .form-box button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: #1a4a7a;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .form-box button svg { width: 16px; height: 16px; }

    .form-box button:hover {
      background: #2e6fad;
      box-shadow: 0 8px 25px rgba(26,74,122,0.3);
    }

    .contact-info { display: flex; flex-direction: column; gap: 15px; }

    .contact-card {
      background: white;
      border: 1px solid #ddeeff;
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: 0.2s;
    }

    .contact-card:hover {
      border-color: #5b9fd6;
      box-shadow: 0 5px 20px rgba(26,74,122,0.1);
    }

    .c-icon {
      width: 46px;
      height: 46px;
      background: #f0f7ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #1a4a7a;
    }

    .c-icon svg { width: 22px; height: 22px; }

    .contact-card h5 { color: #1a4a7a; font-size: 11px; letter-spacing: 1px; margin-bottom: 3px; }
    .contact-card p { color: #888; font-size: 13px; }

    /* ===== فوتر ===== */
    footer {
      background: #1a4a7a;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 40px 20px;
      font-size: 13px;
    }

    footer .footer-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    footer .footer-brand .arkan-mark { width: 18px; height: 18px; color: white; }

    footer strong { color: white; letter-spacing: 3px; font-family: 'Poppins', sans-serif; }
    footer .footer-tagline { color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 1px; margin-bottom: 14px; }
    footer p { margin-bottom: 8px; line-height: 2; }

    footer nav a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      margin: 0 12px;
      font-size: 12px;
      transition: 0.2s;
    }

    footer nav a:hover { color: white; }

    /* ===== منوی موبایل ===== */
    .hamburger {
      display: none;
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 1000;
      background: #1a4a7a;
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
    }

    .hamburger span {
      display: block;
      width: 18px;
      height: 2px;
      background: white;
      border-radius: 3px;
    }

    @media(max-width:768px) {
      .hamburger { display: flex; }
      nav ul { display: none; }
      .hero h2 { font-size: 26px; }
      .photo-slot { width: 100px; height: 100px; }
    }

  </style>
